name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  headless:
    name: headless profile
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      # URL for the MicroNT-patched wibo binary. Override per-workflow if
      # bumping to a newer wibo fork release.
      WIBO_URL: https://github.com/HarryR/wibo/releases/download/v1.1.0-micront.2/wibo-x86_64

    steps:
      - name: install build deps
        # Two toolchains coexist in this job:
        #   boot-efi  : gcc + gcc-multilib + gnu-efi (ia32 UEFI PE via
        #               crt0 + linker script; libc6-dev-i386 supplies the
        #               32-bit headers)
        #   NT build  : wibo (downloaded below) running the MS toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git \
            gcc gcc-multilib libc6-dev-i386 make \
            gnu-efi \
            python3

      - uses: actions/checkout@v4

      - name: download wibo (MicroNT fork)
        # Fetch the release asset from the patched wibo fork. build.sh
        # expects wibo-x86_64 at the repo root and chmod +x.
        run: |
          curl -fL --retry 3 "$WIBO_URL" -o wibo-x86_64
          chmod +x wibo-x86_64
          ./wibo-x86_64 --version

      - name: build
        # First invocation auto-provisions src/wibo-tools/ (symlinks into
        # PUBLIC/OAK/BIN/I386 + CRTDLL.DLL) and builds the cmd-stub. Every
        # subsequent target runs under wibo.
        run: |
          cd src
          ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: gui-disk
          path: build/gui/
          retention-days: 3
