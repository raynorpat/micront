name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  headless:
    name: headless profile
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      # URL for the MicroNT-patched wibo binary. Override per-workflow if
      # bumping to a newer wibo fork release.
      WIBO_URL: https://github.com/HarryR/wibo/releases/download/v1.1.0-micront.2/wibo-x86_64

    steps:
      - name: install build deps
        # Minimal set — no wine, no build-essential. Everything Windows-side
        # runs through wibo (downloaded below). Only thing needing native
        # compilation is src/boot-efi/, which uses gcc -m32 + gnu-efi's
        # ia32 crt0/lds to produce BOOTIA32.EFI.
        #
        # Required by boot-efi's Makefile: gcc (pulls in binutils = ld +
        # objcopy), gcc-multilib (-m32 support), gnu-efi, make. Plus curl
        # to fetch wibo, ca-certificates for HTTPS, git for checkout.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git \
            gcc gcc-multilib make \
            gnu-efi \
            python3

      - uses: actions/checkout@v4

      - name: download wibo (MicroNT fork)
        # Fetch the release asset from the patched wibo fork. build.sh
        # expects wibo-x86_64 at the repo root and chmod +x.
        run: |
          curl -fL --retry 3 "$WIBO_URL" -o wibo-x86_64
          chmod +x wibo-x86_64
          ./wibo-x86_64 --version

      - name: build headless
        # First invocation auto-provisions src/wibo-tools/ (symlinks into
        # PUBLIC/OAK/BIN/I386 + CRTDLL.DLL) and builds the cmd-stub. Every
        # subsequent target runs under wibo.
        run: |
          cd src
          ./build.sh headless

      - name: inventory outputs
        run: |
          echo "=== disk image ==="
          ls -la build/headless/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: headless-disk
          path: build/headless/
          retention-days: 14
