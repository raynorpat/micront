name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  headless:
    name: headless profile
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      # URL for the MicroNT-patched wibo binary. Override per-workflow if
      # bumping to a newer wibo fork release.
      WIBO_URL: https://github.com/HarryR/wibo/releases/download/v1.1.0-micront.2/wibo-x86_64
      # Coveralls repo token, surfaced as a job env var so the upload step
      # can gate on its presence (`if:` can read env but not secrets).
      # Absent on local `gh act` runs and on forks — the step skips there.
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

    steps:
      - name: install build deps
        # Three toolchains coexist in this job, all driven by
        # `src/build.sh`:
        #   NT build  : wibo (downloaded below) running the MS toolchain
        #               for kernel + drivers + userland.
        #   boot-efi  : gcc + gcc-multilib + gnu-efi for BOOTX64.EFI
        #               (ia32 UEFI PE via crt0 + linker script).
        #   cr        : mingw-w64 i686 cross-compiler producing native-
        #               subsystem PE for run.exe + lua.dll; libc6-dev-i386
        #               is needed because LuaJIT's buildvm insists on
        #               host/target pointer size match (host x86_64,
        #               target i386) so minilua + buildvm must compile
        #               under `gcc -m32`.
        # Plus qemu-system-x86 + ovmf for the smoke matrix and
        # `make -C src selftest` later in the job. --no-install-recommends
        # keeps the VM binary without pulling qemu-system-gui (GTK / SDL
        # / VNC / spice) — none of which boot.sh needs when running
        # -display none.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git \
            gcc libc6-dev make \
            gcc-multilib libc6-dev-i386 \
            gnu-efi \
            gcc-mingw-w64-i686 binutils-mingw-w64-i686 \
            mingw-w64-i686-dev \
            python3 lcov \
            qemu-system-x86 ovmf

      - uses: actions/checkout@v4
        with:
          # src/cr/luajit is a submodule pinned at our v2.1-micront fork
          submodules: recursive

      - name: download wibo (MicroNT fork)
        # Fetch the release asset from the patched wibo fork. build.sh
        # expects wibo-x86_64 at the repo root and chmod +x.
        run: |
          curl -fL --retry 3 "$WIBO_URL" -o wibo-x86_64
          chmod +x wibo-x86_64
          ./wibo-x86_64 --version

      - name: stamp version
        # NTVERP.H carries the build identity (date as YYMM/DD, channel,
        # short sha) consumed by every PE we link.  stamp-version.py
        # rewrites it from the current git HEAD so each CI build is
        # uniquely identified down to the commit; idempotent — re-running
        # with the same inputs produces no diff.
        #
        # safe.directory: actions/checkout marks the workspace safe in the
        # host's git config, but child invocations from inside the
        # container run as a different uid and trip git's dubious-
        # ownership check.  Re-marking inside the container makes
        # subprocess `git rev-parse` succeed.
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          python3 src/tools/stamp-version.py

      - name: build (Lua-driven)
        # build.sh dispatches into pkg/ntosbe/build.lua as a regular
        # package module — the same body that will run inside MicroNT
        # once platform.spawn_wait's NT backend lands.  Bootstraps the
        # host LuaJIT on first run via bootstrap.sh.  No-arg invocation
        # builds 'all', which includes:
        #   - tools/ntoskrnl/drivers/userland (wibo + MS toolchain)
        #   - cr (mingw cross-compile of run.exe + lua.dll)
        #   - boot/efi (gcc + gnu-efi for BOOTX64.EFI — the UEFI loader)
        #   - boot/vmlinuz (gcc -m32 for vmlinux — the PVH loader, booted
        #     via QEMU -kernel for the firmware-less ramdisk path)
        # 'all' builds every artifact but composes NO disk image — the
        # smoke / selftest / selfhost steps below each bake their own
        # disk (their own ntosbe profile) and reuse every other artifact.
        run: src/build.sh

      - name: smoke matrix UEFI (machine, disk)
        # Far cheaper than the full selftest (~10 s/combo vs ~4 min
        # for one): boot the system on each hardware shape, confirm
        # Lua reaches `print("SMOKE OK")`, power off.  Catches
        # boot-side regressions across the full matrix without
        # paying the in-OS rebuild cost on every shape.
        #
        # This is the UEFI path (OVMF + BOOTX64.EFI booting an ESP disk);
        # the PVH path (vmlinuz + ramdisk) is the matrix immediately below.
        #
        # Runs BEFORE the full selftest so a boot-side regression
        # fails the workflow fast, before paying the ~4 min in-OS
        # rebuild on the default shape.
        #
        # Build the smoke disk once (Init\Args pointed at smoke.lua)
        # and reboot it across the cartesian (machines × disks) — the
        # disk image is profile-agnostic per the same-image-everywhere
        # design, so one bake covers every combo.
        #
        # 60 s timeout per boot is generous: cold-cache OVMF + kernel
        # init + driver init + Lua "print + shutdown" runs in <15 s
        # on a runner.
        run: |
          make -C src smoke-disk
          fail=0
          machines="q35 pc"
          disks="nvme ide virtio-blk"
          for machine in $machines; do
            for disk in $disks; do
              log="smoke-$machine-$disk.log"
              echo "=== smoke: machine=$machine disk=$disk ==="
              timeout 60 src/boot.sh --disk-image build/disk-smoke/esp.img \
                --machine "$machine" --disk "$disk" \
                < /dev/null 2>&1 | tee "$log" || true
              if grep -q '^SMOKE OK' "$log"; then
                echo "  PASS: $machine+$disk"
              else
                echo "  FAIL: $machine+$disk (no SMOKE OK in log)"
                fail=1
              fi
            done
          done
          exit $fail

      - name: smoke matrix PVH (machine)
        # The firmware-less path: the PVH loader (boot/vmlinuz/vmlinux)
        # booted via QEMU -kernel with an MBR/FAT16 ramdisk via -initrd,
        # exercising ramscsi (the RAM-disk SCSI miniport) as the boot
        # volume — the vmlinuz counterpart to the UEFI smoke matrix above.
        #
        # Bake the smoke ramdisk once (smoke.lua entry) then boot it across
        # machines.  Unlike the UEFI matrix there's NO disk-backend axis:
        # the boot volume is always the RAM disk (ramscsi), independent of
        # chipset.  microvm is deferred — it currently hangs in user-mode
        # FP-exception dispatch (a kernel/HAL issue orthogonal to the boot
        # path); add it to `machines` once that's fixed.
        run: |
          make -C src smoke-ramdisk-disk
          fail=0
          machines="q35 pc"
          for machine in $machines; do
            log="smoke-pvh-$machine.log"
            echo "=== smoke PVH: machine=$machine ==="
            timeout 60 src/boot.sh \
              --ramdisk build/disk-smoke-ramdisk/initrd.img \
              --vmlinux src/boot/vmlinuz/vmlinux \
              --machine "$machine" \
              < /dev/null 2>&1 | tee "$log" || true
            if grep -q '^SMOKE OK' "$log"; then
              echo "  PASS: pvh+$machine"
            else
              echo "  FAIL: pvh+$machine (no SMOKE OK in log)"
              fail=1
            fi
          done
          exit $fail

      - name: run selftest under QEMU with coverage
        # Boot micront under OVMF/QEMU with the `selftest` ntosbe
        # profile — the lean disk: kernel + driver + fuzz suites, no NT
        # source tree, no in-OS rebuild — under the qcov TCG plugin.
        # `make coverage` runs the same selftest suites instrumented,
        # then cov2lcov.py turns the per-block execution histogram into
        # an lcov .info; `make coverage-html` renders it with genhtml.
        #
        # Runs AFTER the smoke matrix (a boot-side regression fails the
        # workflow first) and BEFORE selfhost (the expensive in-OS
        # rebuild).
        #
        # `make coverage` tees the boot to build/cov/serial.log; the
        # harness's ALL PASSED sentinel is grepped from there, last, so
        # the coverage artifacts are produced even when a suite fails
        # (a failed suite prints FAILURES, grep -q returns non-zero,
        # and the step fails — after coverage has been captured).
        #
        # The plugin's per-block callback roughly doubles the ~4 min
        # selftest, and cov2lcov adds ~1 min — 20 min wall is headroom.
        #
        # </dev/null: boot.sh uses -chardev stdio,mux=on for the VM's
        # serial console. Under `act`-style Docker containers without
        # an interactive TTY, qemu can block waiting on stdin. Feeding
        # /dev/null closes the input stream so the mux doesn't stall.
        timeout-minutes: 20
        run: |
          make -C src coverage-html
          grep -q '^ALL PASSED' build/cov/serial.log

      - name: upload coverage to Coveralls
        # Publish cov2lcov's lcov .info to Coveralls.  Only on a passing
        # coverage run (the bare env condition keeps the implicit
        # success() gate) and only when the COVERALLS_REPO_TOKEN secret is
        # present — it's absent on local `gh act` runs and on forks, where
        # an empty token would fail the action and abort the job before the
        # selfhost step, hiding later regressions.  Authenticated with the
        # token as github-token (the Coveralls GitHub App is not in use, so
        # the action forwards it to the reporter as --repo-token).  SF
        # paths in the .info are already repo-relative, so no base-path
        # mapping is needed.
        if: ${{ env.COVERALLS_REPO_TOKEN != '' }}
        uses: coverallsapp/github-action@v2
        with:
          file: build/cov/coverage.info
          format: lcov
          github-token: ${{ secrets.COVERALLS_REPO_TOKEN }}

      - name: run selfhost (in-OS self-build) under QEMU
        # Boot the `selfhost` ntosbe profile — the full disk: NT source
        # tree + MS toolchain.  ntosbe.selfhost drives the in-OS rebuild
        # (tools + kernel + drivers + userland) via NMAKE — the
        # self-build ouroboros.
        # TCG-only (no /dev/kvm in containers); the in-OS rebuild has
        # grown with the driver set and now runs ~10 min on a GitHub
        # runner under TCG.  The 30-minute wall timeout gives headroom
        # for further growth while still bounding a genuinely hung VM.
        #
        # Runs LAST: the most expensive stage, reached only once the
        # smoke matrix and selftest have passed.
        timeout-minutes: 30
        run: |
          make -C src selfhost < /dev/null 2>&1 | tee selfhost.log
          grep -q '^SELFHOST OK' selfhost.log
