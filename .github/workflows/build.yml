name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  headless:
    name: headless profile
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      # URL for the MicroNT-patched wibo binary. Override per-workflow if
      # bumping to a newer wibo fork release.
      WIBO_URL: https://github.com/HarryR/wibo/releases/download/v1.1.0-micront.2/wibo-x86_64

    steps:
      - name: install build deps
        # Three toolchains coexist in this job:
        #   boot-efi  : gcc + gcc-multilib + gnu-efi (ia32 UEFI PE via
        #               crt0 + linker script)
        #   NT build  : wibo (downloaded below) running the MS toolchain
        #   cr testbed: mingw-w64 i686 cross-compiler producing native-
        #               subsystem PE; libc6-dev-i386 is needed because
        #               LuaJIT's buildvm insists on host/target pointer
        #               size match (host x86_64, target i386) so minilua
        #               + buildvm must compile under `gcc -m32`.
        # Plus qemu-system-x86 + ovmf for `make -C src/cr selftest` at
        # the end of the job. --no-install-recommends keeps the VM
        # binary without pulling qemu-system-gui (GTK / SDL / VNC /
        # spice) — none of which boot.sh needs when running -display
        # none for the selftest profile.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git \
            gcc libc6-dev make \
            gcc-multilib libc6-dev-i386 \
            gnu-efi \
            gcc-mingw-w64-i686 binutils-mingw-w64-i686 \
            mingw-w64-i686-dev \
            python3 \
            qemu-system-x86 ovmf

      - uses: actions/checkout@v4
        with:
          # src/cr/luajit is a submodule pinned at our v2.1-micront fork
          submodules: recursive

      - name: download wibo (MicroNT fork)
        # Fetch the release asset from the patched wibo fork. build.sh
        # expects wibo-x86_64 at the repo root and chmod +x.
        run: |
          curl -fL --retry 3 "$WIBO_URL" -o wibo-x86_64
          chmod +x wibo-x86_64
          ./wibo-x86_64 --version

      - name: stamp version
        # NTVERP.H carries the build identity (date as YYMM/DD, channel,
        # short sha) consumed by every PE we link.  stamp-version.py
        # rewrites it from the current git HEAD so each CI build is
        # uniquely identified down to the commit; idempotent — re-running
        # with the same inputs produces no diff.
        #
        # safe.directory: actions/checkout marks the workspace safe in the
        # host's git config, but child invocations from inside the
        # container run as a different uid and trip git's dubious-
        # ownership check.  Re-marking inside the container makes
        # subprocess `git rev-parse` succeed.
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          python3 src/tools/stamp-version.py

      - name: build (Lua-driven)
        # build.sh dispatches into pkg/ntosbe/build.lua as a regular
        # package module — the same body that will run inside MicroNT
        # once platform.spawn_wait's NT backend lands.  Bootstraps the
        # host LuaJIT on first run via bootstrap.sh.  No-arg invocation
        # builds 'all'.
        run: src/build.sh

      - name: build cr (native-NT testbed)
        # Independent from the wibo toolchain — pure mingw cross-compile.
        # Produces src/cr/lua.dll + run.exe (subsystem=native 3.50,
        # ntdll-only).  Re-builds LuaJIT from the submodule for the i386
        # mingw target (the host build above was wiped after bootstrap).
        run: make -C src/cr all

      - name: run cr selftest under QEMU
        # Boot micront under OVMF/QEMU with INIT_ARGS pointed at
        # selftest.lua; the Lua harness prints a summary and shuts
        # down cleanly. TCG-only (no /dev/kvm in containers); selftest
        # is ~1min on a GitHub runner. 5-minute wall timeout prevents
        # a hung VM from stalling the whole workflow.
        #
        # Tee to selftest.log and grep for the harness's ALL PASSED
        # sentinel. Any failed tests print FAILURES instead so grep -q
        # returns non-zero and the step fails. The `tee` exit status
        # doesn't matter for pass/fail — grep is the signal.
        #
        # </dev/null: boot.sh uses -chardev stdio,mux=on for the VM's
        # serial console. Under `act`-style Docker containers without
        # an interactive TTY, qemu can block waiting on stdin. Feeding
        # /dev/null makes the input stream close immediately so the
        # mux doesn't stall.
        run: |
          timeout 300 make -C src/cr selftest < /dev/null 2>&1 | tee selftest.log
          grep -q '^ALL PASSED' selftest.log
